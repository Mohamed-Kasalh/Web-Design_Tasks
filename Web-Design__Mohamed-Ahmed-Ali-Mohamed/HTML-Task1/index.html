<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Diversity & Inclusion Training</title>
  </head>
  <body>
    <div>
      <h1>Diversity &amp; Inclusion Training</h1>

      <form>
        <div>
          <label for="name">Name</label>
          <br />
          <input type="text" id="name" name="name" />
        </div>
        <div>
          <label for="password">Password</label>
          <br />
          <input
            type="password"
            id="password"
            name="password"
            placeholder="password"
          />
        </div>

        <div>
          <label for="email">Email</label>
          <br />
          <input type="email" id="email" name="email" />
        </div>

        <div>
          <label for="tel">Tel</label>
          <br />
          <input type="tel" id="tel" name="tel" />
        </div>

        <div>
          <label for="org">Organization or company</label>
          <br />
          <textarea id="org" name="org"></textarea>
        </div>

        <fieldset>
          <legend>Registration type</legend>

          <div>
            <input
              type="radio"
              id="business_radio"
              name="reg_type_radio"
              value="Business"
            />
            <label for="business_radio">Business</label>
          </div>

          <div>
            <input
              type="radio"
              id="educator_radio"
              name="reg_type_radio"
              value="Educator"
            />
            <label for="educator_radio">Educator</label>
          </div>

          <div>
            <input
              type="radio"
              id="parent_radio"
              name="reg_type_radio"
              value="Parent"
            />
            <label for="parent_radio">Parent</label>
          </div>

          <div>
            <input
              type="radio"
              id="student_radio"
              name="reg_type_radio"
              value="Student"
            />
            <label for="student_radio">Student</label>
          </div>

          <div>
            <input
              type="radio"
              id="other_radio"
              name="reg_type_radio"
              value="Other"
              checked
            />
            <label for="other_radio">Other</label>
          </div>

          <div>
            <input
              type="checkbox"
              id="business"
              name="reg_type"
              value="Business"
            />
            <label for="business">Business</label>
          </div>

          <div>
            <input
              type="checkbox"
              id="educator"
              name="reg_type"
              value="Educator"
            />
            <label for="educator">Educator</label>
          </div>

          <div>
            <input type="checkbox" id="parent" name="reg_type" value="Parent" />
            <label for="parent">Parent</label>
          </div>

          <div>
            <input
              type="checkbox"
              id="student"
              name="reg_type"
              value="Student"
            />
            <label for="student">Student</label>
          </div>

          <div>
            <input
              type="checkbox"
              id="other"
              name="reg_type"
              value="Other"
              checked
            />
            <label for="other">Other</label>
          </div>
        </fieldset>

        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
